name: 01 - Gerar certificado de assinatura (rodar uma vez)

# Esse workflow NAO roda sozinho a cada push - so quando voce aciona
# manualmente pela aba "Actions" do GitHub (botao "Run workflow"). E um
# passo unico de configuracao: gera um certificado autoassinado, salva a
# chave privada (.pfx) de volta no repositorio (usada por todo build
# futuro) e disponibiliza a chave publica (.cer) como artefato pra voce
# instalar uma vez no celular.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cert:
    runs-on: windows-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Gerar certificado autoassinado
        shell: pwsh
        run: |
          $pfxPath = "uwp/PokedexUWP/PokedexUWP_TemporaryKey.pfx"
          $cerPath = "pokedex-public-cert.cer"
          $password = "Pokedex2026!"

          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=RodCarvalho-Pokedex-SelfSigned" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Pokedex Tracker - certificado de sideload" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}Subject Type:End Entity")

          $securePassword = ConvertTo-SecureString -String $password -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePassword | Out-Null
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          Write-Host "Certificado gerado com sucesso."

      - name: Publicar o certificado publico (.cer) como artefato
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-public-cert
          path: pokedex-public-cert.cer

      - name: Salvar a chave privada (.pfx) de volta no repositorio
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uwp/PokedexUWP/PokedexUWP_TemporaryKey.pfx
          git commit -m "chore: gerar certificado de assinatura para sideload (automatico)" || echo "nada para commitar"
          git push
