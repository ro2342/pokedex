name: 02 - Build do appxbundle e deploy (PWA + download)

# Roda automaticamente a cada push que mexer em uwp/ ou www/, e tambem
# pode ser disparado manualmente pela aba Actions. Gera o .appxbundle
# pronto pra sideload no celular, publica em app/ (link estavel), e
# publica o site inteiro no GitHub Pages: PWA em / e pagina de download
# em /app/.
on:
  push:
    branches: [main]
    paths:
      - "uwp/**"
      - "www/**"
      - ".github/workflows/02-build-appx.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Verificar se o certificado de sideload ja existe
        shell: pwsh
        run: |
          $pfx = "uwp/PokedexUWP/PokedexUWP_TemporaryKey.pfx"
          if (-not (Test-Path $pfx)) {
            Write-Error "Certificado nao encontrado em $pfx. Rode primeiro o workflow '01 - Gerar certificado de assinatura' na aba Actions (botao Run workflow), espere terminar, e entao rode este de novo."
            exit 1
          }

      - name: Instalar Node (pra gerar o content.json)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Conferir se Data/content.json esta em dia com www/js/data.js
        shell: pwsh
        run: |
          node scripts/generate-content-json.js
          git diff --quiet -- uwp/PokedexUWP/Data/content.json
          if ($LASTEXITCODE -ne 0) {
            Write-Error "content.json estava desatualizado - regenerado agora. Rode 'node scripts/generate-content-json.js' localmente, commite o resultado, e re-push."
            exit 1
          }

      - name: Configurar MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Instalar o Windows 10 SDK 17763 (metadados do UWP)
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.4
        with:
          sdk-version: 17763

      - name: Injetar segredo do OAuth Desktop (nao fica no historico do git)
        shell: pwsh
        env:
          GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET }}
        run: |
          $path = "uwp/PokedexUWP/Services/AuthService.cs"
          if (-not $env:GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET) {
            Write-Error "Secret GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET nao configurado no repositorio (Settings > Secrets and variables > Actions)."
            exit 1
          }
          $content = (Get-Content $path -Raw) -replace '__GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET__', $env:GOOGLE_OAUTH_DESKTOP_CLIENT_SECRET
          Set-Content $path -Value $content -NoNewline

      - name: Restaurar pacotes NuGet e compilar o appxbundle
        shell: cmd
        run: |
          msbuild uwp\PokedexUWP\PokedexUWP.csproj ^
            /restore ^
            /p:Configuration=Release ^
            /p:Platform=ARM ^
            /p:AppxBundlePlatforms=ARM ^
            /p:AppxBundle=Always ^
            /p:UapAppxPackageBuildMode=SideloadOnly ^
            /p:UseDotNetNativeToolchain=true ^
            /p:AppxPackageSigningEnabled=true ^
            /p:PackageCertificateKeyFile=PokedexUWP_TemporaryKey.pfx ^
            /p:PackageCertificatePassword=Pokedex2026! ^
            /p:AppxPackageDir=%CD%\AppPackages\ ^
            /verbosity:minimal

      - name: Publicar o appxbundle como artefato
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-appxbundle
          path: AppPackages/**
          if-no-files-found: error

      - name: Publicar o appxbundle e o version.json em app/ (link estavel pro GitHub Pages)
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path AppPackages -Recurse -Filter *.appxbundle | Select-Object -First 1
          if (-not $bundle) {
            Write-Error "Nenhum .appxbundle encontrado em AppPackages."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path app | Out-Null
          Copy-Item $bundle.FullName -Destination "app/app.appxbundle" -Force

          [xml]$manifest = Get-Content "uwp/PokedexUWP/Package.appxmanifest"
          $version = $manifest.Package.Identity.Version
          $builtAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $versionJson = @{ version = $version; builtAt = $builtAt } | ConvertTo-Json -Compress
          Set-Content -Path "app/version.json" -Value $versionJson -NoNewline

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/app.appxbundle app/version.json
          git diff --cached --quiet -- app/app.appxbundle app/version.json
          if ($LASTEXITCODE -eq 0) {
            Write-Host "app.appxbundle e version.json ja estao atualizados, nada para commitar."
          } else {
            git commit -m "chore: atualiza app/app.appxbundle e app/version.json (automatico)"
            git push
          }

      - name: Preparar o conteudo do GitHub Pages (PWA em / + download em /app/)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pages-dist | Out-Null
          Copy-Item -Path "www/*" -Destination "pages-dist" -Recurse -Force
          Copy-Item -Path "app" -Destination "pages-dist/app" -Recurse -Force

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar o site (PWA + download) como artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
